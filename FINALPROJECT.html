<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | WAEC Vault</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo-area">
<h2 class="logo">WAEC Vault</h2>
<p class="tagline">Your Gateway to BECE & WASSCE Success</p>
</div>

</nav>

<section class="page-banner">
<h1>Create Account</h1>
</section>

<section class="form-section">

<form id="registrationForm">

<input type="text" id="fullname" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="school" placeholder="School Name">

<select id="subject">

<option>Select Examination</option>
<option>BECE</option>
<option>WASSCE</option>

</select>

<button type="submit" class="btn">
Register
</button>

</form>

</section>

<script src="js/script.js"></script>

</body>
</html>
