  (function(){document.addEventListener('DOMContentLoaded',function(){try{if(document.querySelector('.explain-btn'))return;var img=document.getElementById('subject-image');var overview=img?img.closest('.card'):document.querySelector('.card');if(!overview)return;var btn=document.createElement('button');btn.className='btn btn-outline explain-btn';btn.style.margin='12px 20px';btn.textContent='Study More';btn.addEventListener('click',function(){var titleEl=document.getElementById('subject-title');var title=titleEl?titleEl.textContent:'Subject';var ul=overview.querySelector('ul');var topics=[];if(ul)Array.from(ul.querySelectorAll('li')).forEach(function(li){topics.push(li.textContent.trim());});var p=overview.querySelector('p');var desc=p?p.textContent.trim():'';showSubjectExplanation({title:title,topics:topics,description:desc});});overview.appendChild(btn);}catch(e){}});})();
